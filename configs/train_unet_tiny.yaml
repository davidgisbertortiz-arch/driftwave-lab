# Tiny U-Net config for CI / unit tests (fast, small grid)
# Use with: python scripts/train.py --config configs/train_unet_tiny.yaml

model:
  name: unet
  in_channels: 2
  out_channels: 2
  base_filters: 4

training:
  epochs: 2
  batch_size: 4
  lr: 1.0e-3
  scheduler: cosine

data:
  dataset_dir: data/raw
  input_fields: [n, phi]
  target: next_step

checkpoint_dir: checkpoints

seed: 42
